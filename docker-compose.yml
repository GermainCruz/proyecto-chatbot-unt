services:
  db:
    image: pgvector/pgvector:pg16
    container_name: untbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-untbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-untbot}
      POSTGRES_DB: ${POSTGRES_DB:-untbot}
    ports:
      - "5432:5432"
    volumes:
      - untbot_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-untbot} -d ${POSTGRES_DB:-untbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: untbot_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-untbot}:${POSTGRES_PASSWORD:-untbot}@db:5432/${POSTGRES_DB:-untbot}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      ALLOWED_EMAIL_DOMAIN: unitru.edu.pe
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@unitru.edu.pe}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234*}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador UNT Bot}
    volumes:
      - untbot_storage:/app/storage
      - ./.env:/app/.env
      - ./backend/app:/app/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: untbot_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"

volumes:
  untbot_pgdata:
  untbot_storage:
